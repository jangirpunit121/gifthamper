{% extends 'gift/base.html' %}
{% block content %}
<div class="container my-5"><div class="row justify-content-center"><div class="col-md-6">
    <div class="card"><div class="card-header bg-warning"><h4>Edit Product: {{ product.name }}</h4></div>
    <div class="card-body"><form method="POST" enctype="multipart/form-data">{% csrf_token %}
        <input type="text" name="name" value="{{ product.name }}" class="form-control mb-3" required>
        <input type="number" name="price" value="{{ product.price }}" class="form-control mb-3" step="0.01" required>
        <textarea name="description" class="form-control mb-3" rows="4" required>{{ product.description }}</textarea>
        <input type="number" name="stock" value="{{ product.stock }}" class="form-control mb-3">
        {% if product.image %}<img src="{{ product.image.url }}" style="max-height:150px" class="mb-3">{% endif %}
        <input type="file" name="image" class="form-control mb-3" accept="image/*">
        <button type="submit" class="btn btn-warning">Update</button>
        <a href="{% url 'admin_products' %}" class="btn btn-secondary">Cancel</a>
    </form></div></div>
</div></div></div>
{% endblock %}
