{% extends 'gift/base.html' %}
{% block content %}
<div class="container my-5">
    <div class="d-flex justify-content-between"><h2>Products</h2><a href="{% url 'admin_create_product' %}" class="btn btn-success"><i class="fas fa-plus"></i> Add Product</a></div>
    <div class="table-responsive"><table class="table">
        <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
        <tbody>{% for product in products %}<tr><td>{% if product.image %}<img src="{{ product.image.url }}" style="width:50px;height:50px">{% else %}<i class="fas fa-image"></i>{% endif %}</td>
        <td>{{ product.name }}</td><td>₹{{ product.price }}</td><td>{{ product.stock }}</td>
        <td><a href="{% url 'admin_edit_product' product.id %}" class="btn btn-warning btn-sm">Edit</a>
        <a href="{% url 'admin_delete_product' product.id %}" class="btn btn-danger btn-sm" onclick="return confirm('Delete?')">Delete</a></td></tr>{% empty %}<tr><td colspan="5">No products</td></tr>{% endfor %}</tbody>
    </table></div>
</div>
{% endblock %}
